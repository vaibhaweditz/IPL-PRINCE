<title>IPL 2026 Profit Panel</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:url('background.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
    color:white;
}

/* OVERLAY */

.overlay{
    min-height:100vh;
    padding:25px;

    background:linear-gradient(
        rgba(0,0,0,0.78),
        rgba(0,0,0,0.75)
    );
}

/* LOGIN */

.login-box{

    width:340px;

    margin:auto;
    margin-top:90px;

    padding:35px;

    border-radius:22px;

    background:rgba(0,0,0,0.45);

    border:1px solid rgba(255,215,0,0.4);

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 20px rgba(255,215,0,0.1);

    text-align:center;
}

.login-box h2{

    font-size:40px;
    margin-bottom:25px;

    color:gold;
}

.login-box input{

    width:100%;

    padding:15px;
    margin:12px 0;

    border:none;
    border-radius:12px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,215,0,0.2);

    color:white;

    outline:none;
}

.login-box button{

    width:100%;

    padding:15px;

    margin-top:12px;

    border:none;
    border-radius:12px;

    background:linear-gradient(
        135deg,
        #d4a017,
        gold
    );

    color:black;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;
}

/* MAIN PANEL */

.main-panel{
    display:none;
}

/* TOP BOX */

.top-box{

    display:flex;
    gap:25px;

    flex-wrap:wrap;

    margin-bottom:35px;
}

/* CARD */

.card{

    flex:1;
    min-width:260px;

    padding:28px;

    border-radius:22px;

    background:rgba(0,0,0,0.35);

    border:1px solid rgba(255,215,0,0.4);

    backdrop-filter:blur(3px);

    box-shadow:
    0 0 20px rgba(255,215,0,0.08);
}

.card h3{

    text-align:center;

    font-size:28px;

    color:gold;

    margin-bottom:18px;
}

/* BALANCE */

.balance{

    text-align:center;

    font-size:60px;
    font-weight:bold;

    color:gold;

    text-shadow:
    0 0 10px rgba(255,215,0,0.4);
}

/* BUTTON */

.edit-btn{

    width:100%;

    margin-top:22px;

    padding:14px;

    border:none;
    border-radius:12px;

    background:linear-gradient(
        135deg,
        #d4a017,
        gold
    );

    color:black;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
}

/* TITLE */

.big-title{

    text-align:center;

    font-size:55px;
    font-weight:bold;

    margin:35px 0;

    color:gold;

    text-shadow:
    0 0 15px rgba(255,215,0,0.4);
}

/* TABLE */

table{

    width:100%;

    border-collapse:collapse;

    overflow:hidden;

    border-radius:20px;

    background:rgba(0,0,0,0.30);

    border:1px solid rgba(255,215,0,0.25);

    backdrop-filter:blur(2px);
}

th,td{

    padding:18px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.06);
}

th{

    color:gold;

    font-size:24px;

    background:rgba(255,215,0,0.07);
}

td{

    font-size:20px;
}

/* INPUT */

.table-input{

    width:100%;

    padding:15px;

    border:none;
    border-radius:12px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,215,0,0.18);

    color:gold;

    font-size:18px;
    font-weight:bold;

    text-align:center;

    outline:none;
}

.table-input:disabled{

    opacity:1;
    color:gold;
}

/* MOBILE */

@media(max-width:768px){

    .big-title{
        font-size:32px;
    }

    .balance{
        font-size:40px;
    }

    th{
        font-size:18px;
    }

    td{
        font-size:14px;
    }

}
.withdraw-btn{

    margin-top:20px;

    width:100%;

    padding:13px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #d4a017,
        gold
    );

    color:black;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 15px rgba(255,215,0,0.35);

}

.withdraw-btn:hover{

    transform:scale(1.03);

    box-shadow:
    0 0 20px rgba(255,215,0,0.45);

}
</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyCqyUBYsuSwbI8r9h6G-o9l1mx4F8yqSSs",

  authDomain: "prince-ipl-2026.firebaseapp.com",

  databaseURL:
  "https://prince-ipl-2026-default-rtdb.firebaseio.com",

  projectId: "prince-ipl-2026",

  storageBucket:
  "prince-ipl-2026.firebasestorage.app",

  messagingSenderId: "749359099540",

  appId:
  "1:749359099540:web:978b89a756824d07998e81",

  measurementId: "G-0G62WRXGVC"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let currentUser = "";

/* LIVE BALANCE LOAD */

onValue(ref(db,"balances"),(snapshot)=>{

    let data = snapshot.val();

    if(data){

        if(data.myBalance){

            document
            .getElementById("myBalance")
            .innerText = data.myBalance;

        }

        if(data.friendBalance){

            document
            .getElementById("friendBalance")
            .innerText = data.friendBalance;

        }

    }

});

/* LIVE TABLE LOAD */

for(let i=0;i<14;i++){

    onValue(ref(db,"table/input"+i),(snapshot)=>{

        let value = snapshot.val();

        if(value !== null){

            document
            .querySelectorAll(".table-input")[i]
            .value = value;

        }

    });

}

/* LOGIN */

window.login = function(){

    let user =
    document.getElementById("username").value;

    let pass =
    document.getElementById("password").value;

    // ADMIN

    if(user === "vaibhaw" && pass === "1234"){

        currentUser = "admin";

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("mainPanel")
        .style.display = "block";

    }

    // VIEWER

    else if(user === "prince" && pass === "5678"){

        currentUser = "viewer";

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("mainPanel")
        .style.display = "block";

        document
        .getElementById("withdrawBtn")
        .style.display = "block";

        // HIDE YOUR CARD

        document
        .getElementById("myCard")
        .style.display = "none";

        // HIDE BUTTONS

        let buttons =
        document.querySelectorAll(".edit-btn");

        buttons.forEach(btn=>{

            btn.style.display = "none";

        });

        // DISABLE INPUT

        let inputs =
        document.querySelectorAll(".table-input");

        inputs.forEach(input=>{

            input.disabled = true;

        });

    }

    else{

        alert("Wrong Username or Password");

    }

}

/* EDIT BALANCE */

window.editBalance = function(id){

    if(currentUser !== "admin") return;

    let amount =
    prompt("Enter New Balance");

    if(amount != null){

        let value = "₹" + amount;

        document
        .getElementById(id)
        .innerText = value;

        // SAVE ONLINE

        set(
            ref(db,"balances/"+id),
            value
        );

    }

}

/* AUTO SAVE TABLE */

let inputs =
document.querySelectorAll(".table-input");

inputs.forEach((input,index)=>{

    input.addEventListener("input",()=>{

        set(

            ref(db,"table/input"+index),

            input.value

        );

    });

});

</script>
